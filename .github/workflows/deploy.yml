name: Deploy to VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.100.100
          username: root
          password: root
          script: |
            cd /root
            git clone https://github.com/hswuz/firestone.git
            cd firestone
            nohup go run main.go > app.log 2>&1 &
