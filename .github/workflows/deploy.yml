name: Deploy to VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.100.100   # 👈 改成你的虚拟机IP
          username: root          # 👈 账号
          password: root          # 👈 密码
          script: |
            cd /root
            rm -rf firestone
            git clone https://github.com/Dylanly1/firestone.git
            cd firestone
            nohup go run main.go > app.log 2>&1 &