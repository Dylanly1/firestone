name: Docker Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 47.94.200.20
          username: root
          password:Lyj123456..
          script: |
            cd /root
            
            # 以下操作 只在阿里云服务器上运行
            # 不会影响你本地一丁点代码！！！
            
            if [ ! -d "firestone" ]; then
              git clone https://github.com/Dylanly1/firestone.git
            else
              cd firestone
              git pull
            fi
            
            cd /root/firestone
            
            docker stop myapp 2>/dev/null
            docker rm myapp 2>/dev/null
            
            docker build -t myapp .
            
            docker run -d \
              --name myapp \
              --restart always \
              -p 80:80 \
              myapp
