name: Docker Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Aliyun
        uses: appleboy/ssh-action@master
        with:
          host: 47.94.200.20
          username: root
          password: Lyj123456..
          script: |
            cd /root
            rm -rf firestone
            git clone https://github.com/Dylanly1/firestone.git
            cd firestone
            
            docker stop myapp || true
